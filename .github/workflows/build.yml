name: NothingsVN Xiaomi ROM Build

on:
  workflow_dispatch:
    inputs:
      input_url:
        description: 'URL of the ROM to build'
        required: true
      chat_id:
        description: 'Telegram chat ID to notify when done'
        required: false
        default: ''

jobs:
  Initialize:
    runs-on: ubuntu-latest
    steps:
      - name: Clean All Unused file,application
        run: |
          docker rmi `docker images -q` || true
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/sudo apt/sources.list.d || true
          sudo apt -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell mysql* php* || true
          sudo apt -y autoremove --purge || true
          sudo apt -y autoclean || true
          sudo apt clean || true

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Set up Time
        run: |
          echo "Setting Vietnam timezone"
          sudo timedatectl set-timezone Asia/Ho_Chi_Minh

      - name: Install OpenJDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install Stuff
        run: |
          sudo bash setup.sh

      - name: Giving permission
        run: |
          sudo chmod 777 -R *

      - name: Build ROM...
        env:
          INPUT_URL: ${{ inputs.input_url }}
        run: |
          sudo bash build.sh "$INPUT_URL"

      - name: Pack ROM...
        run: |
          sudo bash packROM.sh

      - name: Setup Rclone...
        env:
          RCLONE_CONFIG_CONTENT: ${{ secrets.RCLONE_CONFIG_CONTENT }}
        run: |
          echo "$RCLONE_CONFIG_CONTENT" > rclone.conf

      - name: Upload ROM...
        run: |
          sudo chmod +x uploadROM.sh
          sudo -E bash uploadROM.sh

      - name: Get Drive Link
        if: success()
        id: drivelink
        run: |
          rom_os=$(cat bin/ddevice/rom_os.txt 2>/dev/null || echo "unknown")
          device_code=$(cat bin/ddevice/device_code.txt 2>/dev/null || echo "unknown")
          polyxver=$(cat Version 2>/dev/null || echo "unknown")

          if [[ $rom_os == "MIUI" ]]; then
            uploaddir="MIUI"
            os_label="MIUI"
          else
            uploaddir="HyperOS"
            os_label="HyperOS"
          fi

          # Lấy link folder Google Drive bằng rclone link
          FOLDER_PATH="Gdrive:NTBuild/${uploaddir}/${polyxver}/${device_code}"
          DRIVE_LINK=$(rclone --config=rclone.conf link "$FOLDER_PATH" 2>/dev/null || echo "")

          echo "DRIVE_LINK=$DRIVE_LINK" >> $GITHUB_OUTPUT
          echo "OS_LABEL=$os_label" >> $GITHUB_OUTPUT
          echo "DEVICE_CODE=$device_code" >> $GITHUB_OUTPUT
          echo "POLYXVER=$polyxver" >> $GITHUB_OUTPUT

      - name: Notify Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ inputs.chat_id }}
          JOB_STATUS: ${{ job.status }}
          DRIVE_LINK: ${{ steps.drivelink.outputs.DRIVE_LINK }}
          OS_LABEL: ${{ steps.drivelink.outputs.OS_LABEL }}
          DEVICE_CODE: ${{ steps.drivelink.outputs.DEVICE_CODE }}
          POLYXVER: ${{ steps.drivelink.outputs.POLYXVER }}
        run: |
          if [[ -z "$CHAT_ID" ]]; then
            echo "[INFO] No chat_id provided, skipping Telegram notification."
            exit 0
          fi

          if [[ "$JOB_STATUS" == "success" ]]; then
            python3 -c "
          import urllib.request, json, os
          token = os.environ['TG_TOKEN']
          chat_id = os.environ['CHAT_ID']
          drive_link = os.environ.get('DRIVE_LINK', '')
          device_code = os.environ.get('DEVICE_CODE', 'unknown')
          polyxver = os.environ.get('POLYXVER', 'unknown')
          os_label = os.environ.get('OS_LABEL', 'unknown')
          
          if drive_link:
              link_text = f'🔗 <a href=\"{drive_link}\">Tải về tại đây</a>'
          else:
              link_text = f'📂 <code>NTBuild/{os_label}/{polyxver}/{device_code}/</code>'
          
          message = f'''✅ <b>Build hoàn tất!</b>
          
          📱 <b>Device:</b> {device_code}
          📦 <b>Version:</b> {polyxver}
          🏷️ <b>Type:</b> {os_label}
          
          {link_text}'''
          
          data = json.dumps({'chat_id': chat_id, 'text': message, 'parse_mode': 'HTML'}).encode('utf-8')
          req = urllib.request.Request(
              f'https://api.telegram.org/bot{token}/sendMessage',
              data=data, headers={'Content-Type': 'application/json'}
          )
          print(urllib.request.urlopen(req).read().decode())
          "
                    else
                      python3 -c "
          import urllib.request, json, os
          token = os.environ['TG_TOKEN']
          chat_id = os.environ['CHAT_ID']
          run_url = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          input_url = '${{ inputs.input_url }}'
          
          message = f'''❌ <b>Build thất bại!</b>
          
          📱 <b>URL ROM:</b> <code>{input_url}</code>
          🔗 <a href=\"{run_url}\">Xem log lỗi tại đây</a>'''
          
          data = json.dumps({'chat_id': chat_id, 'text': message, 'parse_mode': 'HTML'}).encode('utf-8')
          req = urllib.request.Request(
              f'https://api.telegram.org/bot{token}/sendMessage',
              data=data, headers={'Content-Type': 'application/json'}
          )
          print(urllib.request.urlopen(req).read().decode())
          "
                    fi
