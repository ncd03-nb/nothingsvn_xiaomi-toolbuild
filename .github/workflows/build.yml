name: NothingsVN Xiaomi ROM Build

on:
  workflow_dispatch:
    inputs:
      input_url:
        description: 'URL of the ROM to build'
        required: true
      chat_id:
        description: 'Group chat ID to notify'
        required: false
        default: ''
      user_id:
        description: 'User ID to send PM with link'
        required: false
        default: ''

jobs:
  Initialize:
    runs-on: ubuntu-latest
    steps:
      - name: Clean All Unused file,application
        run: |
          docker rmi `docker images -q` || true
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/sudo apt/sources.list.d || true
          sudo apt -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell mysql* php* || true
          sudo apt -y autoremove --purge || true
          sudo apt -y autoclean || true
          sudo apt clean || true

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Set up Time
        run: |
          echo "Setting Vietnam timezone"
          sudo timedatectl set-timezone Asia/Ho_Chi_Minh

      - name: Install OpenJDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install Stuff
        run: |
          sudo bash setup.sh

      - name: Giving permission
        run: |
          sudo chmod 777 -R *

      - name: Build ROM...
        env:
          INPUT_URL: ${{ inputs.input_url }}
        run: |
          sudo bash build.sh "$INPUT_URL"

      - name: Pack ROM...
        run: |
          sudo bash packROM.sh

      - name: Setup Rclone...
        env:
          RCLONE_CONFIG_CONTENT: ${{ secrets.RCLONE_CONFIG_CONTENT }}
        run: |
          echo "$RCLONE_CONFIG_CONTENT" > rclone.conf

      - name: Upload ROM...
        run: |
          sudo chmod +x uploadROM.sh
          sudo -E bash uploadROM.sh

      - name: Get Drive Link
        if: success()
        id: drivelink
        run: |
          rom_os=$(cat bin/ddevice/rom_os.txt 2>/dev/null || echo "unknown")
          device_code=$(cat bin/ddevice/device_code.txt 2>/dev/null || echo "unknown")
          polyxver=$(cat Version 2>/dev/null || echo "unknown")

          if [[ $rom_os == "MIUI" ]]; then
            uploaddir="MIUI"
            os_label="MIUI"
          else
            uploaddir="HyperOS"
            os_label="HyperOS"
          fi

          # Lấy link folder Google Drive bằng rclone link
          FOLDER_PATH="Gdrive:NothingsVN/${uploaddir}/${polyxver}/${device_code}"
          DRIVE_LINK=$(rclone --config=rclone.conf link "$FOLDER_PATH" 2>/dev/null || echo "")

          echo "DRIVE_LINK=$DRIVE_LINK" >> $GITHUB_OUTPUT
          echo "OS_LABEL=$os_label" >> $GITHUB_OUTPUT
          echo "DEVICE_CODE=$device_code" >> $GITHUB_OUTPUT
          echo "POLYXVER=$polyxver" >> $GITHUB_OUTPUT

      - name: Notify Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ inputs.chat_id }}
          USER_ID: ${{ inputs.user_id }}
          JOB_STATUS: ${{ job.status }}
          DRIVE_LINK: ${{ steps.drivelink.outputs.DRIVE_LINK }}
          OS_LABEL: ${{ steps.drivelink.outputs.OS_LABEL }}
          DEVICE_CODE: ${{ steps.drivelink.outputs.DEVICE_CODE }}
          POLYXVER: ${{ steps.drivelink.outputs.POLYXVER }}
        run: |
          if [[ -z "$CHAT_ID" && -z "$USER_ID" ]]; then
            echo "[INFO] No chat_id/user_id provided, skipping."
            exit 0
          fi

          PM_ID="${USER_ID:-$CHAT_ID}"

          if [[ "$JOB_STATUS" == "success" ]]; then
            if [[ -n "$DRIVE_LINK" ]]; then
              LINK_LINE="$DRIVE_LINK"
            else
              LINK_LINE="NothingsVN/${OS_LABEL}/${POLYXVER}/${DEVICE_CODE}/"
            fi

            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${PM_ID}" \
              --data-urlencode "text=✅ Build hoàn tất!

          📱 Device: ${DEVICE_CODE}
          📦 Version: ${POLYXVER}
          🏷️ Type: ${OS_LABEL}
          
          🔗 ${LINK_LINE}"
          
                      if [[ -n "$CHAT_ID" && "$CHAT_ID" != "$USER_ID" ]]; then
                        curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                          --data-urlencode "chat_id=${CHAT_ID}" \
                          --data-urlencode "text=✅ Build của [người dùng](tg://user?id=${USER_ID}) hoàn tất! Link đã được gửi vào PM." \
                          -d "parse_mode=Markdown"
                      fi
          
                    else
                      RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
                      curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                        --data-urlencode "chat_id=${PM_ID}" \
                        --data-urlencode "text=❌ Build thất bại!
          
          📱 URL ROM: ${{ inputs.input_url }}
          🔗 Log: ${RUN_URL}"
          
                      if [[ -n "$CHAT_ID" && "$CHAT_ID" != "$USER_ID" ]]; then
                        curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                          --data-urlencode "chat_id=${CHAT_ID}" \
                          --data-urlencode "text=❌ Build của [người dùng](tg://user?id=${USER_ID}) thất bại! Kiểm tra PM để xem log." \
                          -d "parse_mode=Markdown"
                      fi
                    fi
